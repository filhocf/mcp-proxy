name: CodeQL

on:
  push:
    branches: [main, "fork/**"]
  pull_request:
    branches: [main, "fork/**"]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 6am UTC

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: python

      - uses: github/codeql-action/analyze@v3
